# ─────────────────────────────────────────────
# ElectIQ — GitHub Actions CI/CD Pipeline
# Auto-deploys to Google Cloud Run on push to main
# ─────────────────────────────────────────────

name: Build & Deploy to Cloud Run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: electiq
  REGION: asia-south1
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/electiq

jobs:
  # ── Job 1: Lint & Validate ──────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HTML
        run: |
          echo "✅ Checking HTML structure..."
          grep -c "<!DOCTYPE html>" src/index.html && echo "DOCTYPE OK"
          grep -c "</html>" src/index.html && echo "HTML closing tag OK"
          echo "✅ Validation passed"

  # ── Job 2: Build & Deploy ───────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      - name: Push to Container Registry
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE:${{ github.sha }} \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --port=8080 \
            --quiet

      - name: Get Service URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --region=$REGION \
            --format='value(status.url)')
          echo "🚀 Deployed to: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      - name: Health Check
        run: |
          sleep 10
          curl -f $SERVICE_URL/health || exit 1
          echo "✅ Health check passed!"

  # ── Job 3: Notify on Success ────────────────
  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🗳 ElectIQ Deployed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** asia-south1 (Mumbai)" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** electiq" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
